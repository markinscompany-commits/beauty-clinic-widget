<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<script src="//api.bitrix24.com/api/v1/"></script>
<script>
var HANDLER = 'https://widget-five-alpha.vercel.app';

function setStatus(text) {
  document.getElementById('status').textContent = text;
}

BX24.init(function() {
  setStatus('Настройка приложения...');

  BX24.callMethod('placement.unbind', { PLACEMENT: 'CRM_DEAL_DETAIL_TAB' }, function() {
    BX24.callMethod('placement.bind', {
      PLACEMENT: 'CRM_DEAL_DETAIL_TAB',
      HANDLER: HANDLER,
      LANG_ALL: {
        ru: { TITLE: 'Запись на приём' },
        en: { TITLE: 'Book appointment' }
      }
    }, function(resBind) {
      if (resBind.error()) {
        var err = resBind.error();
        setStatus('Ошибка: ' + (err.ex ? err.ex.error_description : JSON.stringify(err)));
        BX24.installFinish();
      } else {
        setStatus('Готово! Откройте любую сделку — там появится вкладка "Запись на приём".');
        BX24.installFinish(); // Критически важно — завершает установку
      }
    });
  });
});
</script>
</head>
<body>
<p id="status">Установка приложения...</p>
</body>
</html>
